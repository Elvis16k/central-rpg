<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Ficha</h1>

<div class="top-bar">
<button onclick="voltar()">← Voltar</button>
<button onclick="excluirFicha()" style="background:#dc2626;">Excluir</button>
</div>

<div class="foto-container">
<img id="fotoJogador" class="foto">
</div>

<button onclick="alterarFoto()">Alterar Foto</button>

<!-- INFO -->
<div class="section">
<h3>Informações Gerais</h3>

<input id="nome" placeholder="Nome">
<input id="idade" placeholder="Idade">
<input id="genero" placeholder="Gênero">
<input id="especializacao" placeholder="Especialização">
<textarea id="descricao" placeholder="Descrição"></textarea>

</div>

<!-- ATRIBUTOS -->
<div class="atributos-grid">

<div class="atributo-box">
<span>FÍSICO</span>
<input id="fisico" type="number" min="0" max="5">
</div>

<div class="atributo-box">
<span>MENTAL</span>
<input id="mental" type="number" min="0" max="5">
</div>

<div class="atributo-box">
<span>PERSONALIDADE</span>
<input id="personalidade" type="number" min="0" max="5">
</div>

</div>

<!-- PERÍCIAS -->
<div class="section">
<h3>Perícias (máx. 3 por atributo)</h3>

<strong class="pericia-titulo">Físico</strong>
<label class="pericia-item"><input type="checkbox" class="pericia" data-tipo="fisico" value="Atletismo"><span>Atletismo</span></label>
<label class="pericia-item"><input type="checkbox" class="pericia" data-tipo="fisico" value="Luta"><span>Luta</span></label>
<label class="pericia-item"><input type="checkbox" class="pericia" data-tipo="fisico" value="Pontaria"><span>Pontaria</span></label>
<label class="pericia-item"><input type="checkbox" class="pericia" data-tipo="fisico" value="Furtividade"><span>Furtividade</span></label>
<label class="pericia-item"><input type="checkbox" class="pericia" data-tipo="fisico" value="Acrobacia"><span>Acrobacia</span></label>

<strong class="pericia-titulo">Mental</strong>
<label class="pericia-item"><input type="checkbox" class="pericia" data-tipo="mental" value="Medicina"><span>Medicina</span></label>
<label class="pericia-item"><input type="checkbox" class="pericia" data-tipo="mental" value="Investigação"><span>Investigação</span></label>
<label class="pericia-item"><input type="checkbox" class="pericia" data-tipo="mental" value="Tecnologia"><span>Tecnologia</span></label>
<label class="pericia-item"><input type="checkbox" class="pericia" data-tipo="mental" value="Mecânica"><span>Mecânica</span></label>
<label class="pericia-item"><input type="checkbox" class="pericia" data-tipo="mental" value="Sobrevivência"><span>Sobrevivência</span></label>
<label class="pericia-item"><input type="checkbox" class="pericia" data-tipo="mental" value="Percepção"><span>Percepção</span></label>

<strong class="pericia-titulo">Personalidade</strong>
<label class="pericia-item"><input type="checkbox" class="pericia" data-tipo="personalidade" value="Persuasão"><span>Persuasão</span></label>
<label class="pericia-item"><input type="checkbox" class="pericia" data-tipo="personalidade" value="Enganação"><span>Enganação</span></label>
<label class="pericia-item"><input type="checkbox" class="pericia" data-tipo="personalidade" value="Intimidação"><span>Intimidação</span></label>
<label class="pericia-item"><input type="checkbox" class="pericia" data-tipo="personalidade" value="Intuição"><span>Intuição</span></label>
<label class="pericia-item"><input type="checkbox" class="pericia" data-tipo="personalidade" value="Vontade"><span>Vontade</span></label>

</div>

<!-- SINCRONIA -->
<div class="section">
<h3>Sincronia (Tyranium)</h3>

<div class="bar">
<div class="fill" id="sincroniaBar"></div>
</div>

<p id="sincroniaTxt"></p>

<button onclick="addSincronia(1)">+1</button>
<button onclick="addSincronia(-1)">-1</button>
<button onclick="zerarSincronia()">Reset</button>

</div>

<!-- DANO -->
<div class="section">
<h3>Condição</h3>

<div class="dano-info">
<span id="danoTxt"></span>
<span>Tolerância: <span id="limite"></span></span>
</div>

<div class="bar dano-bar">
<div class="fill dano-fill" id="danoBar"></div>
</div>

<div class="dano-botoes">
<button onclick="addDano('leve')">+ Leve</button>
<button onclick="addDano('moderado')">+ Moderado</button>
<button onclick="addDano('grave')">+ Grave</button>
<button onclick="zerarDano()">Curar</button>
</div>

</div>

<!-- FÔLEGO -->
<div class="section">
<h3>Fôlego</h3>

<span id="folegoTxt"></span>

<div class="bar">
<div class="fill" id="folegoBar"></div>
</div>

<button onclick="gastarFolego(1)">-1</button>
<button onclick="recuperarFolego()">+1</button>

</div>

<!-- INVENTÁRIO -->
<div class="section">
<h3>Inventário</h3>

<select id="peso">
<option value="1">Leve</option>
<option value="2">Comum</option>
<option value="3">Pesado</option>
</select>

<input id="itemNome" placeholder="Item">
<button onclick="addItem()">Adicionar</button>

<ul id="inventario"></ul>

<div class="inventario-footer">
  <span>Slots:</span>
  <strong id="slotsUsados">0</strong>
  <span>/</span>
  <strong id="slotsTotal">0</strong>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
